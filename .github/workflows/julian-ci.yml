name: Python CI Workflow

on:
  push:

jobs:
  python-ci:
    runs-on: ubuntu-latest

    steps:
      # Downloads the repository files.
      # This is necessary because the runner needs access to the project's source code.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up Python 3.11.
      # Using a fixed version ensures consistent execution across all workflow runs.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Installs the project dependencies.
      # The application and linting tools must be installed before they can be executed.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Checks the code for style issues.
      # This helps maintain clean and consistent Python code.
      - name: Run flake8
        run: |
          python -m flake8 app.py test_app.py

      # Runs all unit tests in the repository.
      # This verifies that the application behaves as expected after every push.
      - name: Run unit tests
        run: |
          python -m unittest discover -v
